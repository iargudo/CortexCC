; SIP trunk placeholder — configure carrier credentials in production
; Env vars in deploy/asterisk/.env: TRUNK_HOST, TRUNK_USER, TRUNK_PASS

[carrier-trunk]
type=endpoint
context=from-trunk
disallow=all
allow=ulaw,alaw
transport=transport-udp
aors=carrier-trunk
from_domain=${TRUNK_HOST}
direct_media=no
rtp_symmetric=yes
rewrite_contact=yes
force_rport=yes

[carrier-trunk]
type=aor
contact=sip:${TRUNK_HOST}:5060
qualify_frequency=60

; Uncomment and configure when carrier requires registration:
; [carrier-trunk-reg]
; type=registration
; transport=transport-udp
; outbound_auth=carrier-trunk-auth
; server_uri=sip:${TRUNK_HOST}
; client_uri=sip:${TRUNK_USER}@${TRUNK_HOST}
;
; [carrier-trunk-auth]
; type=auth
; auth_type=userpass
; username=${TRUNK_USER}
; password=${TRUNK_PASS}
;
; [carrier-trunk-identify]
; type=identify
; endpoint=carrier-trunk
; match=${TRUNK_HOST}
