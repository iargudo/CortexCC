[from-internal]
; IVR/AI assistant
exten => 1000,1,NoOp(Llamada entrante AI Assistant)
 same => n,Stasis(cortexcc,ai)
 same => n,Hangup()

; Outbound external numbers via Stasis controller
exten => _X.,1,NoOp(Outbound ${EXTEN})
 same => n,GotoIf($["${LEN(${EXTEN})}" > "4"]?external:internal)
 same => n(internal),Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()
 same => n(external),Stasis(cortexcc,outbound,${EXTEN})
 same => n,Hangup()

exten => _+X.,1,NoOp(Outbound E164 ${EXTEN})
 same => n,Stasis(cortexcc,outbound,${EXTEN})
 same => n,Hangup()

#include extensions_trunk.conf
