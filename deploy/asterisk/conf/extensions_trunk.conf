[from-trunk]
; Inbound PSTN/DID — args: mode,did,caller
exten => _X.,1,NoOp(Inbound trunk call DID ${EXTEN} from ${CALLERID(num)})
 same => n,Stasis(cortexcc,inbound,${EXTEN},${CALLERID(num)})
 same => n,Hangup()

exten => _+X.,1,NoOp(Inbound trunk E164 ${EXTEN})
 same => n,Stasis(cortexcc,inbound,${EXTEN},${CALLERID(num)})
 same => n,Hangup()

[outbound-trunk]
; Fallback dialplan outbound via trunk endpoint
exten => _X.,1,NoOp(Trunk outbound ${EXTEN})
 same => n,Dial(PJSIP/carrier-trunk/${EXTEN},60)
 same => n,Hangup()

exten => _+X.,1,NoOp(Trunk outbound E164 ${EXTEN})
 same => n,Dial(PJSIP/carrier-trunk/${EXTEN},60)
 same => n,Hangup()
