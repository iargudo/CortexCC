[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; IMPORTANT:
; - Local: set to host LAN IP or a LAN-resolvable DNS name.
; - Cloud: prefer FQDN (pbx.midominio.com) backed by static public IP.
; If your LAN IP changes, update ONLY these address/domain fields and reload pjsip.
external_signaling_address=192.168.86.77
external_media_address=192.168.86.77
; NAT hinting for local clients (LAN + Docker Desktop bridge/gateway).
; Helps avoid one-way audio when endpoints register via 192.168.65.1/host NAT.
; IMPORTANT: use only your real LAN segment(s). If you mark Docker bridge/gateway
; ranges as local (e.g. 192.168.65.0/24), Asterisk may stop rewriting SDP and
; advertise container IPs (172.x), causing missing greeting/one-way audio.
local_net=192.168.86.0/24

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089

[6001]
type=endpoint
context=from-internal
disallow=all
allow=ulaw,alaw
auth=6001-auth
aors=6001
transport=transport-udp
from_user=6001
from_domain=localhost
; Keep aligned with external_media_address for predictable SDP in NAT scenarios.
media_address=192.168.86.77
; Do not force RTP socket bind to host IP from inside container.
; Keep advertised SDP media IP via media_address.
bind_rtp_to_media_address=no
direct_media=no
rtp_symmetric=yes
rewrite_contact=yes
force_rport=yes

[6001-auth]
type=auth
auth_type=userpass
username=6001
password=6001pass

[6001]
type=aor
max_contacts=1
remove_existing=yes
remove_unavailable=yes
qualify_frequency=15

; WebRTC agent extensions (7001–7099) — synced from CortexCC DB.
; Regenerate: deploy/asterisk/scripts/sync-agent-endpoints.sh
#include pjsip_agents.conf

[8001]
type=endpoint
context=from-internal
disallow=all
allow=ulaw,alaw
auth=8001-auth
aors=8001
transport=transport-udp
from_user=8001
from_domain=localhost
; Keep aligned with external_media_address for predictable SDP in NAT scenarios.
media_address=192.168.86.77
; Do not force RTP socket bind to host IP from inside container.
; Keep advertised SDP media IP via media_address.
bind_rtp_to_media_address=no
direct_media=no
rtp_symmetric=yes
rewrite_contact=yes
force_rport=yes
; Keep NAT pinhole alive for mobile/remote softphones.
rtp_keepalive=25

[8001-auth]
type=auth
auth_type=userpass
username=8001
password=8001pass

[8001]
type=aor
max_contacts=1
remove_existing=yes
remove_unavailable=yes
qualify_frequency=15

#include pjsip_trunk.conf
